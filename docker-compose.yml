version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: weather_redis
    network_mode: "host"
    restart: always

  mongodb: 
    image: mongo:latest
    container_name: weather_mongo
    ports:
      - "27017:27017"
    volumes: 
      - mongo_data:/data/db
    restart: always
    
volumes:
  mongo_data: